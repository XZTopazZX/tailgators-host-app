<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#101820" />
<title>Tail-Gators Host Stand</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#111827;--panel:#eef0f4;--floor:#c7c9d1;--ink:#172033;--line:#6e7482;--open:#ffffff;--seated:#ffe08a;--food:#ffb45c;--check:#8fd3ff;--dirty:#ff8f8f;--hold:#c7f2c7;--toast:#f15b2a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:white;overflow:hidden}button,input,select{font:inherit}.app{height:100vh;display:grid;grid-template-rows:58px 1fr;background:linear-gradient(180deg,#111827,#0b1020)}
  .topbar{display:flex;align-items:center;gap:12px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.12);background:#121927}.brand{display:flex;align-items:center;gap:10px;min-width:250px}.gator{width:34px;height:34px;border-radius:9px;background:var(--toast);display:grid;place-items:center;font-weight:900;color:white}.brand h1{font-size:18px;line-height:1;margin:0}.brand small{display:block;color:#b8c0d5;font-size:11px;margin-top:2px}.stats{display:flex;gap:8px;flex:1}.stat{background:#1d2638;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 10px;min-width:92px}.stat b{display:block;font-size:16px}.stat span{display:block;font-size:10px;color:#aeb8ce;text-transform:uppercase;letter-spacing:.04em}.actions{display:flex;gap:8px}.btn{border:0;border-radius:11px;padding:10px 12px;font-weight:800;background:#2b3852;color:#fff}.btn.primary{background:var(--toast)}.btn:active{transform:scale(.98)}
  .main{display:grid;grid-template-columns:1fr 330px;height:100%;min-height:0}.floorWrap{padding:12px;min-width:0;overflow:hidden}.floor{position:relative;width:100%;height:100%;min-height:560px;background:var(--floor);border:1px solid #8f95a2;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden}.floor:after{content:"";position:absolute;left:0;right:0;bottom:0;height:18%;background:#f3f4f6;border-top:1px solid #9aa0ad;pointer-events:none}.label{position:absolute;border:1px dashed #6e7482;background:rgba(255,255,255,.25);color:#263149;border-radius:2px;display:grid;place-items:center;text-align:center;font-size:clamp(10px,1.2vw,14px);font-weight:700;z-index:1}.solid{border-style:solid;background:rgba(245,246,248,.55)}.front{top:1.6%;left:43%;width:10%;height:4.5%}.host{top:12%;left:40.2%;width:4.2%;height:7.2%}.bar{top:43%;left:40.2%;width:19%;height:18%;font-size:16px}.server{top:63.5%;left:44%;width:10%;height:4.5%}.kitchen{top:70.5%;left:44%;width:10%;height:4.5%}.mens{top:70.5%;left:1%;width:10%;height:4.5%}.ladies{top:70.5%;right:1%;width:10%;height:4.5%}.togo{top:65%;right:1%;width:10%;height:4.5%}.version{position:absolute;right:10px;bottom:8px;z-index:2;color:#667085;font-size:12px;font-weight:800}.table{position:absolute;z-index:3;border:2px solid #5d6472;border-radius:7px;background:var(--open);color:var(--ink);box-shadow:0 2px 0 rgba(0,0,0,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;line-height:1;user-select:none;cursor:pointer}.table .num{font-size:clamp(15px,1.7vw,22px)}.table .meta{font-size:clamp(8px,.9vw,11px);font-weight:800;margin-top:4px;opacity:.85}.table.seated{background:var(--seated)}.table.food{background:var(--food)}.table.check{background:var(--check)}.table.dirty{background:var(--dirty)}.table.hold{background:var(--hold)}.table:active{transform:scale(.96)}.wide{width:7.1%;height:5.4%}.small{width:5.2%;height:5.4%}.rightSmall{width:5.0%;height:5.2%}.leftCol{left:1.0%}.midCol{left:11.0%}.r1{top:1.6%}.r2{top:8.8%}.r3{top:16%}.r4{top:23.2%}.r5{top:35%}.r6{top:42.2%}.r7{top:49.4%}.r8{top:56.6%}.top20{top:1.6%;left:11.0%;width:3.5%;height:5.2%}.t30{top:1.6%;left:31.2%;width:7.2%;height:5.4%}.t50{top:1.6%;left:61%;width:7.2%;height:5.4%}.t60{top:1.6%;left:73%;width:5.2%;height:5.4%}.t70{top:1.6%;left:82%;width:7.2%;height:5.4%}.rcol1{left:73%}.rcol2{left:82%}.rr2{top:8.8%}.rr3{top:16%}.rr4{top:23.2%}.rr5{top:34%}.rr6{top:41.2%}.rr7{top:48.4%}.rr8{top:55.6%}.rr9{top:62.8%}
  .side{border-left:1px solid rgba(255,255,255,.1);background:#161f2f;display:grid;grid-template-rows:auto 1fr;min-height:0}.tabs{display:flex;padding:10px;gap:8px}.tab{flex:1;border:0;border-radius:10px;padding:10px 8px;background:#26344d;color:#dbe5ff;font-weight:900}.tab.active{background:var(--toast);color:#fff}.panel{padding:0 12px 12px;overflow:auto}.card{background:#202b40;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px;margin-bottom:10px}.card h3{margin:0 0 10px;font-size:15px}.row{display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:8px}.row.three{grid-template-columns:1fr 70px 70px}input,select{width:100%;border:1px solid #3d4a63;border-radius:10px;background:#111827;color:white;padding:10px}.miniBtn{width:100%;border:0;border-radius:10px;padding:10px;background:#374761;color:white;font-weight:900}.guest{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px;border-radius:11px;background:#111827;margin-bottom:8px;border:1px solid #334057}.guest b{font-size:14px}.guest small{display:block;color:#aeb8ce}.guest button{border:0;border-radius:8px;background:#2d3b55;color:#fff;padding:7px 9px;font-weight:800}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10}.modal.show{display:flex}.sheet{width:min(420px,92vw);background:#f7f8fb;color:#111827;border-radius:20px;padding:16px;box-shadow:0 20px 70px rgba(0,0,0,.45)}.sheet h2{margin:0 0 12px}.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.statusGrid button{border:0;border-radius:12px;padding:13px;font-weight:900;color:#111827}.s-open{background:var(--open);border:1px solid #ccc!important}.s-seated{background:var(--seated)}.s-food{background:var(--food)}.s-check{background:var(--check)}.s-dirty{background:var(--dirty)}.s-hold{background:var(--hold)}.close{margin-top:12px;background:#111827;color:white!important;width:100%}
  @media(max-width:900px){.main{grid-template-columns:1fr}.side{position:fixed;right:0;top:58px;bottom:0;width:min(360px,96vw);transform:translateX(100%);transition:.2s;z-index:7}.side.open{transform:none}.brand{min-width:auto}.stats{display:none}.floorWrap{padding:6px}.floor{border-radius:10px}.label{font-size:10px}.table .meta{display:none}.small,.wide,.rightSmall{height:6.2%}.front{height:5%}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="gator">TG</div><div><h1>Tail-Gators Host Stand</h1><small>Dining Room • v5 verified layout</small></div></div>
    <div class="stats"><div class="stat"><b id="openCount">0</b><span>Open</span></div><div class="stat"><b id="seatedCount">0</b><span>Seated</span></div><div class="stat"><b id="waitCount">0</b><span>Waiting</span></div><div class="stat"><b id="resCount">0</b><span>Reservations</span></div></div>
    <div class="actions"><button class="btn" id="resetBtn">Reset</button><button class="btn primary" id="togglePanel">Waitlist</button></div>
  </header>
  <main class="main">
    <section class="floorWrap"><div class="floor" id="floor">
      <div class="label front">Front Door</div><div class="label host">Host</div><div class="label bar">Bar</div><div class="label server">Server Area</div><div class="label kitchen">Kitchen</div><div class="label mens">Men's Room</div><div class="label ladies">Ladies Room</div><div class="label togo">Togo -----&gt;</div>
      <div class="version">v5</div>
    </div></section>
    <aside class="side" id="side"><div class="tabs"><button class="tab active" data-tab="wait">Waitlist</button><button class="tab" data-tab="res">Reservations</button></div><div class="panel"><div id="waitPanel"><div class="card"><h3>Add Walk-In</h3><div class="row"><input id="wName" placeholder="Name"><input id="wSize" type="number" min="1" placeholder="#"></div><input id="wNotes" placeholder="Notes"><br><br><button class="miniBtn" id="addWait">Add to Waitlist</button></div><div id="waitList"></div></div><div id="resPanel" style="display:none"><div class="card"><h3>Add Reservation</h3><div class="row three"><input id="rName" placeholder="Name"><input id="rTime" placeholder="Time"><input id="rSize" type="number" min="1" placeholder="#"></div><input id="rNotes" placeholder="Notes"><br><br><button class="miniBtn" id="addRes">Add Reservation</button></div><div id="resList"></div></div></div></aside>
  </main>
</div>
<div class="modal" id="modal"><div class="sheet"><h2 id="modalTitle">Table</h2><div class="row"><input id="partySize" type="number" min="1" placeholder="Party size"><input id="server" placeholder="Server"></div><input id="tableNotes" placeholder="Notes"><br><br><div class="statusGrid"><button class="s-open" data-status="open">Open</button><button class="s-seated" data-status="seated">Seated</button><button class="s-food" data-status="food">Food</button><button class="s-check" data-status="check">Check</button><button class="s-dirty" data-status="dirty">Dirty</button><button class="s-hold" data-status="hold">Hold/Reserved</button></div><button class="btn close" id="closeModal">Close</button></div></div>
<script>
const tables=[['10','wide leftCol r1'],['11','small leftCol r2'],['12','small leftCol r3'],['13','small leftCol r4'],['14','small leftCol r5'],['15','small leftCol r6'],['16','small leftCol r7'],['17','small leftCol r8'],['18','small leftCol rr9'],['20','top20'],['21','wide midCol r2'],['22','wide midCol r3'],['23','small midCol r5'],['24','small midCol r6'],['25','small midCol r7'],['26','small midCol r8'],['27','small midCol rr9'],['30','t30'],['50','t50'],['60','t60'],['70','t70'],['61','rightSmall rcol1 rr2'],['62','rightSmall rcol1 rr3'],['63','rightSmall rcol1 rr5'],['64','rightSmall rcol1 rr6'],['65','rightSmall rcol1 rr7'],['66','rightSmall rcol1 rr8'],['67','rightSmall rcol1 rr9'],['71','rightSmall rcol2 rr2'],['72','rightSmall rcol2 rr3'],['73','rightSmall rcol2 rr4'],['74','rightSmall rcol2 rr5'],['75','rightSmall rcol2 rr6'],['76','rightSmall rcol2 rr7'],['77','rightSmall rcol2 rr8'],['78','rightSmall rcol2 rr9']];
function loadState(){try{return JSON.parse(localStorage.getItem('tg-host-v5')||'{}')}catch(e){return {}}}
function saveState(){try{localStorage.setItem('tg-host-v5',JSON.stringify(state))}catch(e){}}
let state=loadState();state.tables=state.tables||{};state.wait=state.wait||[];state.res=state.res||[];let selected=null;const floor=document.getElementById('floor');
function save(){saveState();updateCounts()}function mins(t){return t?Math.floor((Date.now()-t)/60000):''}
function drawTables(){tables.forEach(([n,cls])=>{let d=document.createElement('div');d.className='table '+cls;d.dataset.table=n;d.innerHTML=`<div class="num">${n}</div><div class="meta"></div>`;d.onclick=()=>openTable(n);floor.appendChild(d)});renderTables()}
function renderTables(){document.querySelectorAll('.table').forEach(el=>{let n=el.dataset.table,s=state.tables[n]||{status:'open'};el.classList.remove('seated','food','check','dirty','hold');if(s.status&&s.status!=='open')el.classList.add(s.status);let meta=[];if(s.party)meta.push(s.party+' top');if(s.started&&s.status!=='open')meta.push(mins(s.started)+'m');el.querySelector('.meta').textContent=meta.join(' • ')})}
function updateCounts(){let vals=Object.values(state.tables);document.getElementById('openCount').textContent=tables.length-vals.filter(x=>x.status&&x.status!=='open').length;document.getElementById('seatedCount').textContent=vals.filter(x=>['seated','food','check'].includes(x.status)).length;document.getElementById('waitCount').textContent=state.wait.length;document.getElementById('resCount').textContent=state.res.length;renderTables();renderLists()}
function openTable(n){selected=n;let s=state.tables[n]||{status:'open'};document.getElementById('modalTitle').textContent='Table '+n;partySize.value=s.party||'';server.value=s.server||'';tableNotes.value=s.notes||'';modal.classList.add('show')}
document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{if(!selected)return;let old=state.tables[selected]||{};let status=b.dataset.status;state.tables[selected]={status,party:partySize.value,server:server.value,notes:tableNotes.value,started:(status==='open'||status==='dirty')?null:(old.started||Date.now())};if(status==='open')delete state.tables[selected];modal.classList.remove('show');save()});closeModal.onclick=()=>modal.classList.remove('show');modal.onclick=e=>{if(e.target.id==='modal')modal.classList.remove('show')};
function addItem(kind){let p=kind==='wait'?'w':'r';let obj={name:document.getElementById(p+'Name').value.trim()||'Guest',size:document.getElementById(p+'Size').value||'',notes:document.getElementById(p+'Notes').value||'',time:kind==='res'?document.getElementById('rTime').value:'',created:Date.now()};state[kind].push(obj);['Name','Size','Notes'].forEach(x=>{let el=document.getElementById(p+x);if(el)el.value=''});if(kind==='res')rTime.value='';save()}
addWait.onclick=()=>addItem('wait');addRes.onclick=()=>addItem('res');function renderLists(){waitList.innerHTML=state.wait.map((g,i)=>`<div class="guest"><div><b>${g.name} ${g.size?'• '+g.size:''}</b><small>${mins(g.created)}m waiting ${g.notes?'• '+g.notes:''}</small></div><button onclick="state.wait.splice(${i},1);save()">Done</button></div>`).join('')||'<div class="card">No one waiting.</div>';resList.innerHTML=state.res.map((g,i)=>`<div class="guest"><div><b>${g.time||'Time?'} • ${g.name} ${g.size?'• '+g.size:''}</b><small>${g.notes||''}</small></div><button onclick="state.res.splice(${i},1);save()">Done</button></div>`).join('')||'<div class="card">No reservations.</div>'}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');waitPanel.style.display=t.dataset.tab==='wait'?'block':'none';resPanel.style.display=t.dataset.tab==='res'?'block':'none'});togglePanel.onclick=()=>side.classList.toggle('open');resetBtn.onclick=()=>{if(confirm('Clear all table statuses, waitlist, and reservations?')){try{localStorage.removeItem('tg-host-v5')}catch(e){};state={tables:{},wait:[],res:[]};save()}};setInterval(updateCounts,30000);drawTables();updateCounts();
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
