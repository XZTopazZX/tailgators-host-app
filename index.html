<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#101820"/>
<title>Tail-Gators Host Stand</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#101820;--floor:#c7c9d1;--ink:#172033;
  --open:#fff;--seated:#66d97f;--ticket:#f15b2a;--food:#f5c842;--dirty:#e85454;
  --toast:#f15b2a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:white;overflow:hidden;}
button,input,select,textarea{font:inherit;}

.app{height:100vh;display:grid;grid-template-rows:50px 1fr;background:linear-gradient(180deg,#111827,#0b1020);}

/* Top Bar */
.topbar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.12);background:#121927;}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.gator{width:30px;height:30px;border-radius:8px;background:var(--toast);display:grid;place-items:center;font-weight:900;font-size:11px;}
.brand h1{font-size:14px;line-height:1;margin:0;white-space:nowrap;}
.stats{display:flex;gap:5px;flex:1;justify-content:center;flex-wrap:nowrap;}
.stat{background:#1d2638;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:3px 8px;text-align:center;min-width:44px;}
.stat b{display:block;font-size:14px;}
.stat span{display:block;font-size:8px;color:#aeb8ce;text-transform:uppercase;letter-spacing:.04em;}
.stat.cap-alert{background:#7f1d1d;border-color:#e85454;animation:pulse-cap 1s infinite;}
@keyframes pulse-cap{0%,100%{opacity:1;}50%{opacity:.7;}}
.btn{border:0;border-radius:9px;padding:7px 11px;font-weight:900;background:#2b3852;color:#fff;cursor:pointer;font-size:12px;flex-shrink:0;}
.btn.primary{background:var(--toast);}
.btn:active{transform:scale(.97);}
.date-stat{background:none;border:none;padding:2px 6px;text-align:center;flex-shrink:0;}
.date-stat b{font-size:11px;}
.date-stat span{font-size:8px;color:#aeb8ce;text-transform:uppercase;}

/* Cap Banner */
#capBanner{display:none;position:fixed;top:50px;left:0;right:0;z-index:15;background:#dc2626;color:#fff;text-align:center;padding:8px;font-weight:900;font-size:15px;letter-spacing:.05em;}
#capBanner.show{display:block;}

/* Floor */
.floorWrap{padding:8px;overflow:hidden;position:relative;}
.floor{position:relative;width:100%;height:100%;background:var(--floor);border:1px solid #8f95a2;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);overflow:hidden;}
.version{position:absolute;right:8px;bottom:6px;z-index:2;color:#667085;font-size:10px;font-weight:900;}

.barShape{position:absolute;top:36%;left:35%;width:22%;height:22%;border:3px solid #8f95a2;border-radius:50% 50% 0 0/60% 60% 0 0;border-bottom:none;background:rgba(255,255,255,.1);z-index:1;}
.barLabel{position:absolute;top:44%;left:44%;color:#4a5060;font-size:13px;font-weight:800;z-index:1;}

/* Tables */
.table{
  position:absolute;z-index:3;border:2px solid #5d6472;border-radius:8px;
  background:var(--open);color:var(--ink);box-shadow:0 2px 0 rgba(0,0,0,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:900;line-height:1;user-select:none;cursor:pointer;
  transition:transform .1s;padding:2px;touch-action:manipulation;
  -webkit-touch-callout:none;-webkit-user-select:none;
}
.table .num{font-size:clamp(13px,1.6vw,20px);}
.table .srv{font-size:clamp(8px,0.8vw,11px);font-weight:700;margin-top:2px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;}
.table .badges{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:space-between;padding:0 3px;font-size:clamp(7px,0.65vw,10px);font-weight:700;opacity:.9;}
.table.seated{background:var(--seated);}
.table.ticket{background:var(--ticket);color:#fff;}
.table.food{background:var(--food);}
.table.dirty{background:var(--dirty);color:#fff;}
.table.dirty.pulse{animation:pulse-dirty 1.5s infinite;}
@keyframes pulse-dirty{0%,100%{opacity:1;}50%{opacity:.55;}}
.table:active{transform:scale(.93);}

/* Table sizes */
.sixTop{width:9.5%;height:10.5%;}
.small{width:7.5%;height:9.5%;}
.rightSmall{width:7%;height:9%;}
.barSeat{width:7%;height:9%;}

/* Layout */
.leftCol{left:1%;}
.midCol{left:12%;}
.r1{top:2%}.r2{top:13%}.r3{top:24%}.r4{top:35%}
.r5{top:47%}.r6{top:58%}.r7{top:69%}.r8{top:80%}.r9{top:91%}
.top20{top:2%;left:12%;}
.t30{top:2%;left:30%;}
.t50{top:2%;left:58%;}
.t60{top:2%;left:71%;}
.t70{top:2%;left:82%;}
.rcol1{left:71%}.rcol2{left:82%;}
.rr2{top:13%}.rr3{top:24%}.rr4{top:35%}
.rr5{top:46%}.rr6{top:57%}.rr7{top:68%}.rr8{top:79%}.rr9{top:90%}
.bL1{top:47%;left:26%}.bL2{top:58%;left:26%}.bL3{top:69%;left:26%}
.bR1{top:47%;left:62%}.bR2{top:58%;left:62%}.bR3{top:69%;left:62%}
.aboveBar1{top:35%;left:32%}.aboveBar2{top:35%;left:42%}.aboveBar3{top:35%;left:52%}

/* Legend */
.legend{position:absolute;bottom:14px;left:14px;display:flex;gap:14px;z-index:4;background:rgba(255,255,255,.88);padding:9px 16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.legend-item{display:flex;align-items:center;gap:7px;font-size:14px;color:#222;font-weight:800;}
.legend-dot{width:20px;height:20px;border-radius:5px;border:2px solid #666;}

/* Panel */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:8;display:none;}
.panel-overlay.show{display:block;}
.panel{position:fixed;right:0;top:0;bottom:0;width:min(390px,92vw);background:#161f2f;z-index:9;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;padding:14px;padding-top:60px;}
.panel.open{transform:translateX(0);}
.panel-close{position:absolute;top:14px;right:14px;border:0;background:#2b3852;color:#fff;border-radius:8px;padding:8px 12px;font-weight:900;cursor:pointer;}

.card{background:#202b40;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px;margin-bottom:10px;}
.card h3{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
.pill{background:#111827;border:1px solid #334057;border-radius:999px;padding:4px 8px;color:#dbe5ff;font-size:11px;}
input,select,textarea{width:100%;border:1px solid #3d4a63;border-radius:10px;background:#111827;color:white;padding:10px;font-size:15px;}
.miniBtn{width:100%;border:0;border-radius:10px;padding:10px;background:#374761;color:white;font-weight:900;cursor:pointer;font-size:14px;}
.miniBtn.orange{background:var(--toast);}
.miniBtn.red{background:#dc2626;}
.guest{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px;border-radius:12px;background:#111827;margin-bottom:6px;border:1px solid #334057;}
.guest b{font-size:14px;}
.guest small{display:block;color:#aeb8ce;font-size:12px;}

/* Server load table */
.load-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
.load-table th{text-align:left;color:#aeb8ce;font-size:11px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid #334057;}
.load-table td{padding:6px 6px;border-bottom:1px solid #1a2540;}
.load-table tr:last-child td{border:none;}
.load-bar{height:6px;border-radius:3px;background:var(--seated);margin-top:3px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;border:0;border-radius:10px;padding:9px 4px;background:#26344d;color:#dbe5ff;font-weight:900;cursor:pointer;font-size:12px;text-align:center;}
.tab.active{background:var(--toast);color:#fff;}

/* Roster item */
.rosterItem{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#111827;border:1px solid #334057;border-radius:10px;margin-bottom:6px;}
.rosterItem span{font-size:14px;font-weight:600;}
.rosterItem button{border:0;background:#ff4d4d;color:#fff;border-radius:6px;padding:5px 10px;font-weight:800;cursor:pointer;font-size:12px;}

/* Seat Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:20;}
.modal.show{display:flex;}
.sheet{width:min(440px,92vw);background:#f7f8fb;color:#111827;border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.5);}
.sheet h2{margin:0 0 16px;font-size:22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:700;color:#555;margin-bottom:4px;}
.field input,.field select{width:100%;padding:14px;font-size:18px;border:2px solid #ddd;border-radius:12px;background:#fff;color:#111;}
.field input:focus,.field select:focus{border-color:var(--toast);outline:none;}
.actions{display:flex;gap:10px;margin-top:16px;}
.actions button{flex:1;padding:14px;border:0;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;}
.actions .cancel{background:#e5e7eb;color:#333;}
.actions .seat{background:var(--toast);color:#fff;}

/* Long Press Popup */
.lp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:24;display:none;}
.lp-overlay.show{display:block;}
.lp-popup{position:fixed;z-index:25;background:#fff;color:#111;border-radius:20px;padding:20px;box-shadow:0 12px 50px rgba(0,0,0,.45);width:min(320px,92vw);top:50%;left:50%;transform:translate(-50%,-50%);display:none;}
.lp-popup.show{display:block;}
.lp-popup h3{margin:0 0 12px;font-size:20px;border-bottom:2px solid #eee;padding-bottom:8px;}
.lp-info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:15px;}
.lp-info-row:last-child{border:none;}
.lp-label{color:#666;font-weight:600;}
.lp-val{font-weight:800;}
.lp-section{margin-top:14px;padding-top:10px;border-top:2px solid #eee;}
.lp-section label{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;display:block;margin-bottom:6px;}
.status-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.status-btn{flex:1;min-width:60px;padding:8px 4px;border:2px solid #ddd;border-radius:10px;font-weight:800;font-size:12px;cursor:pointer;text-align:center;background:#f5f5f5;color:#333;}
.status-btn.active{border-color:#333;}
.status-btn.s-open{background:#fff;}
.status-btn.s-seated{background:#66d97f;}
.status-btn.s-ticket{background:#f15b2a;color:#fff;}
.status-btn.s-food{background:#f5c842;}
.status-btn.s-dirty{background:#e85454;color:#fff;}
.app-btn{width:100%;padding:10px;background:#7c3aed;color:#fff;border:0;border-radius:10px;font-weight:900;cursor:pointer;font-size:14px;margin-top:6px;}
.app-btn:active{opacity:.8;}
.lp-swap select{width:100%;padding:10px;font-size:15px;border:2px solid #ddd;border-radius:10px;background:#fff;color:#111;margin-top:4px;}
.lp-close{width:100%;margin-top:12px;padding:10px;background:#e5e7eb;color:#333;border:0;border-radius:10px;font-weight:900;cursor:pointer;font-size:14px;}

/* Confirm Sold Modal */
.confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:30;}
.confirm-modal.show{display:flex;}
.confirm-sheet{width:min(340px,90vw);background:#fff;color:#111;border-radius:20px;padding:24px;box-shadow:0 20px 70px rgba(0,0,0,.5);text-align:center;}
.confirm-sheet h2{margin:0 0 6px;font-size:24px;}
.confirm-sheet p{margin:0 0 20px;color:#555;font-size:16px;}
.confirm-actions{display:flex;gap:12px;}
.confirm-actions button{flex:1;padding:16px;border:0;border-radius:14px;font-weight:900;font-size:18px;cursor:pointer;}
.confirm-yes{background:#f5c842;color:#111;}
.confirm-no{background:#e5e7eb;color:#333;}

/* Sync dot */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#66d97f;margin-left:6px;display:inline-block;}
.sync-dot.offline{background:#e85454;}
</style>
</head>
<body oncontextmenu="return false;">

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="gator">TG</div>
      <h1>Tail-Gators SLW<span class="sync-dot" id="syncDot"></span></h1>
    </div>
    <div class="stats">
      <div class="stat"><b id="openCount">0</b><span>Open</span></div>
      <div class="stat"><b id="seatedCount">0</b><span>Seated</span></div>
      <div class="stat" id="coversStat"><b id="coversCount">0</b><span>Covers</span></div>
      <div class="stat"><b id="waitCount">0</b><span>Wait</span></div>
      <div class="stat"><b id="nextServerTop">&mdash;</b><span>Next</span></div>
    </div>
    <div class="date-stat"><b id="dateDisplay"></b><span>Today</span></div>
    <button class="btn primary" id="togglePanel">Panel</button>
  </header>

  <section class="floorWrap">
    <div class="floor" id="floor">
      <div class="barShape"></div>
      <div class="barLabel">BAR</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--open)"></div>Open</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--seated)"></div>Menus</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ticket)"></div>Ticket</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--food)"></div>Eating</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--dirty)"></div>Dirty</div>
      </div>
      <div class="version">v16</div>
    </div>
  </section>
</div>

<div id="capBanner">🛑 AT CAP — HOLD SEATING</div>

<!-- Panel -->
<div class="panel-overlay" id="panelOverlay"></div>
<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">✕</button>

  <!-- Server Load -->
  <div class="card">
    <h3>Server Load</h3>
    <table class="load-table">
      <thead><tr><th>Server</th><th>Tables</th><th>Covers</th></tr></thead>
      <tbody id="loadBody"></tbody>
    </table>
  </div>

  <!-- Rotation -->
  <div class="card">
    <h3>Rotation <span class="pill">Next: <b id="nextServerCard">&mdash;</b></span></h3>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select id="rosterPick"><option value="">Pick from roster</option></select>
      <button class="miniBtn orange" id="addServerFromRoster" style="width:70px">Add</button>
    </div>
    <div id="serverList"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <button class="miniBtn" id="skipServer">Skip</button>
      <button class="miniBtn" id="resetRotation">Reset</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="wait">Waitlist</button>
    <button class="tab" data-tab="res">Res</button>
    <button class="tab" data-tab="roster">Roster</button>
    <button class="tab" data-tab="day">Day</button>
  </div>

  <div id="waitPanel">
    <div class="card">
      <h3>Add Walk-In</h3>
      <div style="display:grid;grid-template-columns:1fr 60px;gap:8px">
        <input id="wName" placeholder="Name">
        <input id="wSize" type="number" placeholder="#">
      </div>
      <input id="wNotes" placeholder="Notes" style="margin-top:6px">
      <button class="miniBtn orange" id="addWait" style="margin-top:8px">Add to Waitlist</button>
    </div>
    <div id="waitList"></div>
  </div>

  <div id="resPanel" style="display:none">
    <div class="card">
      <h3>Add Reservation</h3>
      <div style="display:grid;grid-template-columns:1fr 80px 60px;gap:8px">
        <input id="rName" placeholder="Name">
        <input id="rTime" placeholder="Time">
        <input id="rSize" type="number" placeholder="#">
      </div>
      <input id="rNotes" placeholder="Notes" style="margin-top:6px">
      <button class="miniBtn orange" id="addRes" style="margin-top:8px">Add Reservation</button>
    </div>
    <div id="resList"></div>
  </div>

  <div id="rosterPanel" style="display:none">
    <div class="card">
      <h3>Staff Roster</h3>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="rosterName" placeholder="New staff name">
        <button class="miniBtn orange" id="addRoster" style="width:70px">Add</button>
      </div>
      <div id="rosterList"></div>
    </div>
  </div>

  <div id="dayPanel" style="display:none">
    <div class="card">
      <h3>Shift Control</h3>
      <div class="field"><label>Cover Cap</label><div style="display:flex;gap:8px"><input id="capInput" type="number" placeholder="Set limit"><button class="miniBtn orange" id="setCap" style="width:70px">Set</button></div><small id="capStatus" style="display:block;margin-top:4px;color:#aeb8ce"></small><button class="miniBtn" id="clearCap" style="margin-top:6px">Clear Cap</button></div>
      <button class="miniBtn" onclick="exportCSV()" style="margin-bottom:8px">Export Shift CSV</button>
      <button class="miniBtn red" onclick="resetDay()">Reset Day</button>
      <div style="margin-top:14px;padding-top:10px;border-top:1px solid #334057"><a id="reserveLink" href="reserve.html" target="_blank" style="color:var(--toast);font-weight:900;text-decoration:none;font-size:14px">Open Guest Reservation Page →</a></div>
    </div>
  </div>
</div>

<!-- Ticket Sold Confirm -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-sheet">
    <h2>Ticket Sold?</h2>
    <p id="confirmTableLabel">Table</p>
    <div class="confirm-actions">
      <button class="confirm-no" id="confirmNo">Cancel</button>
      <button class="confirm-yes" id="confirmYes">✓ Yes, Sold</button>
    </div>
  </div>
</div>

<!-- Seat Modal -->
<div class="modal" id="modal">
  <div class="sheet">
    <h2 id="modalTitle">Table</h2>
    <div class="field"><label>Party Size</label><input id="partySize" type="number" placeholder="How many?"></div>
    <div class="field"><label>Server</label><select id="serverPick"></select></div>
    <div class="field"><label>Notes</label><textarea id="notes" rows="2" placeholder="Any special requests?"></textarea></div>
    <div class="actions">
      <button class="cancel" id="closeModal">Cancel</button>
      <button class="seat" id="seatTable">Seat Table</button>
    </div>
  </div>
</div>

<!-- Long Press Popup -->
<div class="lp-overlay" id="lpOverlay"></div>
<div class="lp-popup" id="lpPopup">
  <h3 id="lpTitle">Table</h3>
  <div id="lpInfo"></div>
  <div class="lp-section">
    <label>Change Status</label>
    <div class="status-btns" id="statusBtns"></div>
  </div>
  <div class="lp-section lp-swap">
    <label>Change Server</label>
    <select id="swapSelect"></select>
  </div>
  <button class="app-btn" id="appOutBtn">Appetizer Out</button>
  <button class="lp-close" id="lpClose">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {

  authDomain: "tailgators-west-seating.firebaseapp.com",

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'state');

// State
let state = {
  tables: {},

  res: [],

  shiftLog: [],
  coverCap: 0
};

// Config

const tables = [
  [10,'sixTop leftCol r1'],[11,'small leftCol r2'],[12,'small leftCol r3'],[13,'small leftCol r4'],
  [14,'small leftCol r5'],[15,'small leftCol r6'],[16,'small leftCol r7'],[17,'small leftCol r8'],[18,'small leftCol r9'],
  [20,'sixTop top20'],[21,'sixTop midCol r2'],[22,'sixTop midCol r3'],[23,'small midCol r5'],[24,'small midCol r6'],
  [25,'small midCol r7'],[26,'small midCol r8'],[27,'small midCol r9'],
  [30,'sixTop t30'],[50,'sixTop t50'],[60,'small t60'],[70,'sixTop t70'],
  [61,'small rcol1 rr2'],[62,'small rcol1 rr3'],[63,'small rcol1 rr4'],[64,'small rcol1 rr5'],[65,'small rcol1 rr6'],[66,'small rcol1 rr7'],[67,'small rcol1 rr8'],
  [71,'small rcol2 rr2'],[72,'small rcol2 rr3'],[73,'small rcol2 rr4'],[74,'small rcol2 rr5'],[75,'small rcol2 rr6'],[76,'small rcol2 rr7'],[77,'small rcol2 rr8'],[78,'small rcol2 rr9'],
  [31,'barSeat bL1'],[32,'barSeat bL2'],[33,'barSeat bL3'],
  [51,'barSeat bR1'],[52,'barSeat bR2'],[53,'barSeat bR3'],
  [40,'sixTop aboveBar1'],[41,'sixTop aboveBar2'],[42,'sixTop aboveBar3']
];

// Load
onValue(dbRef, (snap) => {
  const d = snap.val();
  if(d){
    state = {...state, ...d};
    if(!state.tables) state.tables = {};
    if(!state.servers) state.servers = [];
    if(!state.roster) state.roster = [];
    if(!state.wait) state.wait = [];
    if(!state.res) state.res = [];
    if(!state.shiftLog) state.shiftLog = [];
    updateAll();
    document.getElementById('syncDot').classList.remove('offline');
  }
}, { cancelCallback: () => document.getElementById('syncDot').classList.add('offline') });

function save(){ set(dbRef, state); }

// Utils
const fmt = (ts) => ts ? new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
const mins = (ts) => ts ? Math.floor((Date.now() - ts)/60000) : 0;

function handleTableClick(n){
  const t = state.tables[n];
  if(!t){
    openSeatModal(n);
  } else {
    let idx = STATUS_CYCLE.indexOf(t.status);
    let next = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];
    if(next === 'open'){
      logEvent(n,'cleared',t);
      delete state.tables[n];
      save();
    } else if(next === 'food'){
      pendingConfirmTable = n;
      document.getElementById('confirmTableLabel').textContent = 'Table '+n+' — '+( t.server||'')+(t.party?' ('+t.party+')':'');
      document.getElementById('confirmModal').classList.add('show');
    } else {
      if(next === 'ticket' && !t.ticketIn){ t.ticketIn = Date.now(); }
      t.status = next;
      t.statusAt = Date.now();
      logEvent(n, next, t);
      save();
    }
  }
}

function logEvent(n, action, t){
  state.shiftLog.push({
    time: new Date().toLocaleString(),
    table: n,
    action: action,
    server: t.server||'',
    party: t.party||'',
    ticketTime: t.ticketTime||null
  });
}

function openSeatModal(n){
  document.getElementById('modalTitle').textContent = 'Table ' + n;
  const sp = document.getElementById('serverPick');
  sp.innerHTML = state.servers.map(s => `<option value="${s}">${s}</option>`).join('') || '<option value="">No servers in rotation</option>';
  const next = state.servers.length ? state.servers[state.rotationIndex % state.servers.length] : '';
  if(next) sp.value = next;
  document.getElementById('partySize').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('modal').classList.add('show');
}

document.getElementById('seatTable').onclick = () => {
  const n = document.getElementById('modalTitle').textContent.replace('Table ','');
  const s = document.getElementById('serverPick').value;
  const p = document.getElementById('partySize').value;
  const notes = document.getElementById('notes').value;
  if(s && p){
    state.tables[n] = {server:s,party:p,notes:notes,started:Date.now(),statusAt:Date.now(),status:'seated'};
    logEvent(n,'seated',state.tables[n]);
    if(state.servers.length && s === state.servers[state.rotationIndex % state.servers.length]){
      state.rotationIndex++;
    }
  }
  document.getElementById('modal').classList.remove('show');
  save();
};
document.getElementById('closeModal').onclick = () => document.getElementById('modal').classList.remove('show');

// ===== CONFIRM SOLD =====
let pendingConfirmTable = null;
document.getElementById('confirmYes').onclick = () => {
  if(!pendingConfirmTable) return;
  const n = pendingConfirmTable;
  const t = state.tables[n];
  if(t){
    if(t.ticketIn && !t.ticketTime){ t.ticketTime = Math.floor((Date.now()-t.ticketIn)/60000); }
    t.status = 'food';
    t.statusAt = Date.now();
    logEvent(n,'food',t);
    save();
  }
  pendingConfirmTable = null;
  document.getElementById('confirmModal').classList.remove('show');
};
document.getElementById('confirmNo').onclick = () => {
  pendingConfirmTable = null;
  document.getElementById('confirmModal').classList.remove('show');
};

// ===== LONG PRESS POPUP =====
let currentLpTable = null;
function showLp(n){
  currentLpTable = n;
  const t = state.tables[n];
  if(!t) return;
  document.getElementById('lpTitle').textContent = 'Table '+n;
  document.getElementById('lpInfo').innerHTML = `
    <div class="lp-info-row"><span class="lp-label">Server</span><span class="lp-val">${t.server||'—'}</span></div>
    <div class="lp-info-row"><span class="lp-label">Party</span><input type="number" id="lpPartyEdit" value="${t.party||''}" style="width:60px;padding:2px 5px;font-size:14px;border:1px solid #ddd;border-radius:4px;text-align:right"></div>
    <div class="lp-info-row"><span class="lp-label">Sat At</span><span class="lp-val">${fmt(t.started)}</span></div>
    <div class="lp-info-row"><span class="lp-label">Total Time</span><span class="lp-val">${mins(t.started)}m</span></div>
    <div class="lp-info-row"><span class="lp-label">Ticket In</span><input type="time" id="lpTicketEdit" value="${t.ticketIn?new Date(t.ticketIn).toTimeString().slice(0,5):''}" style="width:100px;padding:2px 5px;font-size:14px;border:1px solid #ddd;border-radius:4px;text-align:right"></div>
    ${t.ticketTime ? `<div class="lp-info-row"><span class="lp-label">Ticket Time</span><span class="lp-val">${t.ticketTime}m</span></div>` : ''}
    ${t.appOutTime ? `<div class="lp-info-row"><span class="lp-label">App Out</span><span class="lp-val">${fmt(t.appOutTime)}</span></div>` : ''}
    ${t.notes ? `<div class="lp-info-row"><span class="lp-label">Notes</span><span class="lp-val">${t.notes}</span></div>` : ''}
  `;
  const statuses = [{k:'open',l:'Open'},{k:'seated',l:'Menus'},{k:'ticket',l:'Ticket'},{k:'food',l:'Eating'},{k:'dirty',l:'Dirty'}];
  document.getElementById('statusBtns').innerHTML = statuses.map(s =>
    `<button class="status-btn s-${s.k} ${t.status===s.k?'active':''}" onclick="setStatus('${s.k}')">${s.l}</button>`
  ).join('');
  const sw = document.getElementById('swapSelect');
  sw.innerHTML = '<option value="">Pick server...</option>' + state.servers.map(s=>`<option value="${s}">${s}</option>`).join('');
  sw.value = t.server||'';
  document.getElementById('lpPopup').classList.add('show');
  document.getElementById('lpOverlay').classList.add('show');

  document.getElementById('lpPartyEdit').onchange = (e) => {
    if(currentLpTable && state.tables[currentLpTable]){
      state.tables[currentLpTable].party = e.target.value;
      save();
    }
  };
  document.getElementById('lpTicketEdit').onchange = (e) => {
    if(currentLpTable && state.tables[currentLpTable] && e.target.value){
      const [h,m] = e.target.value.split(':');
      const d = new Date(); d.setHours(h); d.setMinutes(m);
      state.tables[currentLpTable].ticketIn = d.getTime();
      save();
    }
  };
}

window.setStatus = (s) => {
  if(!currentLpTable) return;
  let t = state.tables[currentLpTable];
  if(!t) return;
  if(s === 'open'){
    logEvent(currentLpTable,'cleared',t);
    delete state.tables[currentLpTable];
  } else {
    if(s === 'ticket' && !t.ticketIn) t.ticketIn = Date.now();
    if(s === 'food' && t.ticketIn && !t.ticketTime) t.ticketTime = Math.floor((Date.now()-t.ticketIn)/60000);
    t.status = s;
    t.statusAt = Date.now();
    logEvent(currentLpTable, s, t);
  }
  closeLp();
  save();
};

document.getElementById('swapSelect').onchange = (e) => {
  if(!currentLpTable || !e.target.value) return;
  state.tables[currentLpTable].server = e.target.value;
  save();
  closeLp();
};

document.getElementById('appOutBtn').onclick = () => {
  if(!currentLpTable) return;
  let t = state.tables[currentLpTable];
  if(!t) return;
  const now = Date.now();
  if(!t.appOutTime){
    t.appOutTime = now;
  } else {
    t.appTicketTime = Math.floor((now - t.appOutTime)/60000);
    state.shiftLog.push({time:new Date().toLocaleString(), table:currentLpTable, action:'app_delivered', server:t.server||'', party:t.party||'', appTicketTime:t.appTicketTime});
    t.appOutTime = null;
  }
  save();
  closeLp();
};

function closeLp(){
  document.getElementById('lpPopup').classList.remove('show');
  document.getElementById('lpOverlay').classList.remove('show');
  currentLpTable = null;
}
document.getElementById('lpOverlay').onclick = closeLp;
document.getElementById('lpClose').onclick = closeLp;

// ===== DRAW TABLES =====
function drawTables(){
  const floor = document.getElementById('floor');
  tables.forEach(([n,cls]) => {
    const d = document.createElement('div');
    d.className = 'table '+cls;
    d.dataset.table = n;
    d.innerHTML = `<div class="num">${n}</div><div class="srv"></div><div class="badges"><span class="tb"></span><span class="pb"></span></div>`;

    let holdTimer = null, holdFired = false, startX = 0, startY = 0;
    const startHold = (x, y) => {
      holdFired = false;
      startX = x; startY = y;
      holdTimer = setTimeout(() => {
        holdFired = true;
        d.style.filter = '';
        showLp(n);
      }, 500);
    };
    const cancelHold = () => {
      clearTimeout(holdTimer);
      holdTimer = null;
      d.style.filter = '';
    };
    const endHold = () => {
      clearTimeout(holdTimer);
      holdTimer = null;
      d.style.filter = '';
      if (!holdFired) handleTableClick(n);
    };

    d.addEventListener('touchstart', e => {
      e.preventDefault();
      const t0 = e.touches[0];
      startHold(t0.clientX, t0.clientY);
      setTimeout(() => { if(holdTimer) d.style.filter = 'brightness(0.75)'; }, 300);
    }, { passive: false });

    d.addEventListener('touchmove', e => {
      const t0 = e.touches[0];
      const dx = Math.abs(t0.clientX - startX);
      const dy = Math.abs(t0.clientY - startY);
      if (dx > 10 || dy > 10) cancelHold();
    }, { passive: false });

    d.addEventListener('touchend', e => { e.preventDefault(); endHold(); }, { passive: false });
    d.addEventListener('touchcancel', () => cancelHold());
    d.addEventListener('contextmenu', e => e.preventDefault());

    d.addEventListener('mousedown', e => { if(e.button===0) startHold(e.clientX, e.clientY); });
    d.addEventListener('mouseup', () => endHold());
    d.addEventListener('mouseleave', () => cancelHold());
    floor.appendChild(d);
  });
}

// ===== RENDER =====
function updateAll(){
  let covers=0, seated=0;
  document.querySelectorAll('.table').forEach(el => {
    const n = el.dataset.table;
    const t = state.tables[n]||{status:'open'};
    el.classList.remove('seated','ticket','food','dirty','pulse');
    if(t.status && t.status!=='open'){
      el.classList.add(t.status);
      el.querySelector('.srv').textContent = t.server||'';
      const stageStart = t.statusAt || t.started;
      el.querySelector('.tb').textContent = mins(stageStart)+'m';
      el.querySelector('.pb').textContent = t.party||'';
      if(t.status==='seated'||t.status==='ticket'||t.status==='food') seated++;
      if(t.status==='seated'||t.status==='ticket') covers += parseInt(t.party)||0;
      if(t.status==='dirty' && mins(t.started)>10) el.classList.add('pulse');
    } else {
      el.querySelector('.srv').textContent='';
      el.querySelector('.tb').textContent='';
      el.querySelector('.pb').textContent='';
    }
  });

  document.getElementById('openCount').textContent = tables.length - Object.keys(state.tables).length;
  document.getElementById('seatedCount').textContent = seated;
  document.getElementById('coversCount').textContent = covers;
  document.getElementById('waitCount').textContent = state.wait.length;
  const next = state.servers.length ? state.servers[state.rotationIndex % state.servers.length] : '—';
  document.getElementById('nextServerTop').textContent = next;
  document.getElementById('nextServerCard').textContent = next;
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString([], {weekday:'short',month:'short',day:'numeric'});

  const cap = state.coverCap||0;
  const banner = document.getElementById('capBanner');
  const coversStat = document.getElementById('coversStat');
  if(cap > 0){
    document.getElementById('capStatus').textContent = `Cap: ${cap}. Current: ${covers}.`;
    if(covers >= cap){ banner.classList.add('show'); coversStat.classList.add('cap-alert'); }
    else { banner.classList.remove('show'); coversStat.classList.remove('cap-alert'); }
  } else {
    banner.classList.remove('show'); coversStat.classList.remove('cap-alert');
    document.getElementById('capStatus').textContent = 'No cap set.';
  }

  const loadMap = {};
  state.servers.forEach(s => loadMap[s] = {tables:0, covers:0});
  Object.values(state.tables).forEach(t => {
    if(t.server && t.status && t.status!=='open' && t.status!=='dirty'){
      if(!loadMap[t.server]) loadMap[t.server] = {tables:0, covers:0};
      loadMap[t.server].tables++;
      loadMap[t.server].covers += parseInt(t.party)||0;
    }
  });
  const maxCovers = Math.max(1, ...Object.values(loadMap).map(v=>v.covers));
  document.getElementById('loadBody').innerHTML = Object.entries(loadMap).map(([name,v]) =>
    `<tr><td><b>${name}</b><div class="load-bar" style="width:${Math.round(v.covers/maxCovers*100)}%"></div></td><td>${v.tables}</td><td>${v.covers}</td></tr>`
  ).join('') || '<tr><td colspan="3">No servers.</td></tr>';

  document.getElementById('serverList').innerHTML = state.servers.map((s,i) => {
    const isNext = i === state.rotationIndex % state.servers.length;
    return `<div class="guest" style="${isNext?'border:2px solid var(--toast)':''}"><div><b>${s}</b><small>${isNext?'Next Up':'In Rotation'}</small></div><div style="display:flex;gap:6px"><button onclick="window.setNext(${i})" style="border:0;border-radius:8px;background:var(--toast);color:#fff;padding:6px 9px;font-weight:800;cursor:pointer;font-size:12px">Next</button><button onclick="window.removeServer(${i})" style="border:0;border-radius:8px;background:#374761;color:#fff;padding:6px 9px;font-weight:800;cursor:pointer">✕</button></div></div>`;
  }).join('');

  document.getElementById('rosterList').innerHTML = state.roster.map((s,i) =>
    `<div class="rosterItem"><span>${s}</span><button onclick="window.removeRoster(${i})">Remove</button></div>`
  ).join('');
  document.getElementById('rosterPick').innerHTML = '<option value="">Pick from roster</option>' + state.roster.filter(r=>!state.servers.includes(r)).map(r=>`<option value="${r}">${r}</option>`).join('');

  document.getElementById('waitList').innerHTML = state.wait.map((w,i) =>
    `<div class="guest"><div><b>${w.name} (${w.size||'?'})</b><small>${mins(w.created)}m${w.notes?' · '+w.notes:''}</small></div><button onclick="window.seatWait(${i})">Seat</button></div>`
  ).join('');
  document.getElementById('resList').innerHTML = state.res.map((r,i) =>
    `<div class="guest"><div><b>${r.time||'?'} · ${r.name} (${r.size||'?'})</b><small>${r.notes||''}</small></div><button onclick="window.doneRes(${i})">Done</button></div>`
  ).join('');
}

window.setNext = (i) => { state.rotationIndex = i; save(); };
window.removeServer = (i) => { state.servers.splice(i,1); save(); };
window.removeRoster = (i) => { state.roster.splice(i,1); save(); };
window.seatWait = (i) => { state.wait.splice(i,1); save(); };
window.doneRes = (i) => { state.res.splice(i,1); save(); };

document.getElementById('addServerFromRoster').onclick = () => { const s = document.getElementById('rosterPick').value; if(s){ state.servers.push(s); save(); } };
document.getElementById('addRoster').onclick = () => { const s = document.getElementById('rosterName').value.trim(); if(s){ state.roster.push(s); document.getElementById('rosterName').value=''; save(); } };
document.getElementById('addWait').onclick = () => { const n = document.getElementById('wName').value.trim(); if(n){ state.wait.push({name:n,size:document.getElementById('wSize').value,notes:document.getElementById('wNotes').value,created:Date.now()}); save(); } };
document.getElementById('addRes').onclick = () => { const n = document.getElementById('rName').value.trim(); if(n){ state.res.push({name:n,time:document.getElementById('rTime').value,size:document.getElementById('rSize').value,notes:document.getElementById('rNotes').value}); save(); } };
document.getElementById('skipServer').onclick = () => { if(state.servers.length){ state.rotationIndex=(state.rotationIndex+1)%state.servers.length; save(); } };
document.getElementById('resetRotation').onclick = () => { state.rotationIndex=0; save(); };
document.getElementById('setCap').onclick = () => { const v = parseInt(document.getElementById('capInput').value); if(v>0){ state.coverCap=v; save(); } };
document.getElementById('clearCap').onclick = () => { state.coverCap=0; save(); };

document.getElementById('togglePanel').onclick = () => { document.getElementById('panel').classList.add('open'); document.getElementById('panelOverlay').classList.add('show'); };
document.getElementById('panelClose').onclick = () => { document.getElementById('panel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('show'); };
document.getElementById('panelOverlay').onclick = () => { document.getElementById('panel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('show'); };

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    ['wait','res','roster','day'].forEach(p=>document.getElementById(p+'Panel').style.display='none');
    document.getElementById(t.dataset.tab+'Panel').style.display='block';
  };
});

window.exportCSV = () => {
  const rows = [['Time','Table','Action','Server','Party','Dinner Ticket (min)','App Ticket (min)']];
  (state.shiftLog||[]).forEach(e => rows.push([e.time,e.table,e.action,e.server,e.party,e.ticketTime||'',e.appTicketTime||'']));
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `tailgators-shift-${new Date().toLocaleDateString()}.csv`; a.click();
};

window.resetDay = () => {
  if(confirm('Reset all tables and logs? Export CSV first!')){
    state.tables = {}; state.wait = []; state.res = []; state.shiftLog = []; state.rotationIndex = 0; save();
  }
};

drawTables();
setInterval(updateAll, 30000);
</script>
</body>
</html>
